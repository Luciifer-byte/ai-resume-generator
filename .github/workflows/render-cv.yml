name: Render CV

permissions:
  contents: write

on:
  push:
    paths:
      - 'cv.yaml'
      - '.github/workflows/render-cv.yml'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install RenderCV + preview deps
        run: pip install "rendercv[full]==2.8" pymupdf

      - name: Clear stale PDFs
        run: rm -f rendercv_output/*.pdf

      - name: Render CV
        run: rendercv render cv.yaml

      - name: Generate PNG preview
        run: |
          python - <<'PY'
          import fitz, glob, os
          pdf = max(glob.glob("rendercv_output/*.pdf"), key=os.path.getmtime)
          fitz.open(pdf)[0].get_pixmap(dpi=110).save("rendercv_output/preview.png")
          PY

      - name: Commit PDF + preview
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A rendercv_output/
          git diff --staged --quiet || git commit -m "Auto-render CV PDF [skip ci]"
          git pull --rebase origin main
          git push
