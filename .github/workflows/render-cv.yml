name: Render CV

permissions:
  contents: write

on:
  push:
    paths:
      - 'cv.yaml'
      - 'cv.tailored.yaml'
      - 'scripts/**'
      - '.github/workflows/render-cv.yml'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install RenderCV + preview deps
        run: pip install --no-cache-dir "rendercv[full]==2.8" pymupdf

      - name: Render CV
        run: rendercv render cv.yaml

      - name: Generate PNG preview
        run: |
          python - <<'PY'
          import fitz, glob
          pdf = sorted(glob.glob("rendercv_output/*.pdf"))[0]
          fitz.open(pdf)[0].get_pixmap(dpi=110).save("rendercv_output/preview.png")
          PY

      - name: Commit PDF + preview
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add rendercv_output/*.pdf rendercv_output/preview.png -f
          git diff --staged --quiet || git commit -m "Auto-render CV PDF [skip ci]"
          git push
