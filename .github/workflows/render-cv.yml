name: Render CV

permissions:
  contents: write

on:
  push:
    paths:
      - 'cv.yaml'
      - 'cv.tailored.yaml'
      - 'scripts/**'
      - 'job_description.example.txt'
      - '.github/workflows/render-cv.yml'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      JOB_DESCRIPTION: ${{ secrets.JOB_DESCRIPTION }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install RenderCV + preview deps
        run: pip install "rendercv[full]==2.8" pymupdf PyYAML

      - name: Optional AI tailoring
        if: ${{ env.OPENAI_API_KEY != '' || env.ANTHROPIC_API_KEY != '' || env.GEMINI_API_KEY != '' }}
        run: |
          pip install google-generativeai
          if [ -n "$JOB_DESCRIPTION" ]; then echo "$JOB_DESCRIPTION" > /tmp/jd.txt; JD=/tmp/jd.txt; else JD=job_description.example.txt; fi
          python scripts/tailor.py --cv cv.yaml --jd "$JD" --out cv.tailored.yaml

      - name: Pick CV source
        id: src
        run: |
          if [ -f cv.tailored.yaml ]; then echo "file=cv.tailored.yaml" >> "$GITHUB_OUTPUT"; else echo "file=cv.yaml" >> "$GITHUB_OUTPUT"; fi

      - name: Render CV
        run: rendercv render ${{ steps.src.outputs.file }}

      - name: Generate PNG preview
        run: |
          python - <<'PY'
          import fitz, glob
          pdf = sorted(glob.glob("rendercv_output/*.pdf"))[0]
          fitz.open(pdf)[0].get_pixmap(dpi=110).save("rendercv_output/preview.png")
          PY

      - name: Commit PDF + preview
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add rendercv_output/*.pdf rendercv_output/preview.png -f
          git diff --staged --quiet || git commit -m "Auto-render CV PDF [skip ci]"
          git push
